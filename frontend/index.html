<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local PDF Translator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel upload-panel">
        <h1>PDF Translation Workbench</h1>
        <p class="sub">Upload a PDF, choose the regions to OCR, then translate.</p>

        <div id="dropzone" class="dropzone">
          <input id="fileInput" type="file" accept="application/pdf" hidden />
          <p>Drag and drop a PDF here</p>
          <button id="pickBtn" type="button">Select Files</button>
        </div>

        <div class="settings-grid">
          <label>Chunk Tokens <input id="chunkSize" type="number" min="128" max="8000" value="1800" /></label>
          <label>LLM Temperature <input id="temp" type="number" min="0" max="1" step="0.05" value="0.2" /></label>
          <label>LLM Max Tokens <input id="maxTokens" type="number" min="256" max="8192" value="2048" /></label>
          <label>Translation LLM
            <select id="model">
              <option value="mlx-community/Qwen3.5-9B-8bit" selected>Qwen3.5 9B 8-bit</option>
            </select>
          </label>
          <label>LLM Top P <input id="topP" type="number" min="0" max="1" step="0.05" value="0.9" /></label>
        </div>
      </section>

      <section class="panel region-panel">
        <div class="queue-head">
          <h2>PDF Translation Pipeline</h2>
        </div>
        <ol id="workflowSteps" class="workflow-steps">
          <li data-step="upload">Upload</li>
          <li data-step="select">Select OCR regions</li>
          <li data-step="ocr">OCR selected regions</li>
          <li data-step="translate">Translate</li>
          <li data-step="export">Rebuild / Export</li>
        </ol>
        <p id="regionStatus" class="sub">No region-editing job selected.</p>
        <div class="region-toolbar">
          <button id="prevPageBtn" class="secondary-button" type="button">Previous Page</button>
          <button id="nextPageBtn" class="secondary-button" type="button">Next Page</button>
          <button id="saveBoxesBtn" class="secondary-button" type="button">Save boxes</button>
          <button id="reloadSavedBoxesBtn" class="secondary-button" type="button" hidden>Reload saved boxes</button>
          <button id="useFullPageBtn" class="secondary-button" type="button">Use full page</button>
          <button id="addBoxBtn" type="button">Add region</button>
        </div>
        <div class="workflow-actions">
          <button id="runOcrSelectedBtn" type="button">Next: OCR selected regions</button>
          <button id="startSelectedModeBtn" type="button" hidden>Translate now</button>
        </div>
        <div class="region-layout">
          <div class="canvas-wrap">
            <div id="regionCanvas"></div>
          </div>
          <aside class="region-sidebar">
            <h3>OCR Regions</h3>
            <div id="boxList" class="box-list"></div>
          </aside>
        </div>
      </section>

      <section class="panel queue-panel">
        <div class="queue-head">
          <h2>Document Queue</h2>
          <div class="queue-actions">
            <button id="cleanTerminalBtn" class="secondary-button" type="button">Clean Cancelled/Failed</button>
            <button id="stopAllBtn" class="danger-button" type="button">Stop All Processes</button>
            <button id="clearResultsBtn" class="danger-button" type="button">Clean Results</button>
          </div>
        </div>
        <div id="queue"></div>
      </section>
    </main>

    <script src="https://unpkg.com/konva@9.3.15/konva.min.js"></script>
    <script src="/app.js?v=20260429-saved-regions-continuous-ocr" defer></script>
  </body>
</html>
