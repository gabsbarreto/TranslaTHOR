<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local PDF Translator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel upload-panel">
        <h1>PDF Translation Workbench</h1>
        <p class="sub">Local pipeline: DeepSeek-OCR-2 + Qwen translation</p>

        <div id="dropzone" class="dropzone">
          <input id="fileInput" type="file" accept="application/pdf" multiple hidden />
          <p>Drag and drop PDFs here</p>
          <button id="pickBtn" type="button">Select Files</button>
        </div>

        <div class="staged-head">
          <h2>Staged Documents</h2>
          <div class="queue-actions">
            <button id="parseTranslateBtn" type="button">Parse and Translate</button>
            <button id="clearStagedBtn" class="secondary-button" type="button">Clear Staged</button>
          </div>
        </div>
        <div id="stagedQueue"></div>

        <div class="settings-grid">
          <label>Chunk Tokens <input id="chunkSize" type="number" min="128" max="8000" value="1800" /></label>
          <label>LLM Temperature <input id="temp" type="number" min="0" max="1" step="0.05" value="0.2" /></label>
          <label>LLM Max Tokens <input id="maxTokens" type="number" min="256" max="8192" value="2048" /></label>
          <label>Translation LLM
            <select id="model">
              <option value="mlx-community/Qwen3.5-9B-8bit" selected>Qwen3.5 9B 8-bit</option>
            </select>
          </label>
          <label>LLM Top P <input id="topP" type="number" min="0" max="1" step="0.05" value="0.9" /></label>
        </div>
      </section>

      <section class="panel queue-panel">
        <div class="queue-head">
          <h2>Document Queue</h2>
          <div class="queue-actions">
            <button id="cleanTerminalBtn" class="secondary-button" type="button">Clean Cancelled/Failed</button>
            <button id="stopAllBtn" class="danger-button" type="button">Stop All Processes</button>
            <button id="clearResultsBtn" class="danger-button" type="button">Clean Results</button>
          </div>
        </div>
        <div id="queue"></div>
      </section>
    </main>

    <script src="/app.js?v=20260427-deepseek-only" defer></script>
  </body>
</html>
